<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Restaurant Management System 🍽️</h1>

<div class="container">

  <h2>Menu</h2>
  <div id="menu"></div>

  <hr>

  <h2>Place Order</h2>

  <input type="text" id="customer" placeholder="Customer Name"><br>

  <select id="itemSelect"></select><br>

  <input type="number" id="qty" placeholder="Quantity"><br>

  <button onclick="placeOrder()">Place Order</button>

  <hr>

  <h2>Orders</h2>
  <div id="orders"></div>

</div>

<script src="script.js"></script>

</body>
</html>
